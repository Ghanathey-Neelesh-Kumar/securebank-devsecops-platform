name: SecureBank CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write
  security-events: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ghanathey-neelesh-kumar/securebank-backend
  FRONTEND_IMAGE_NAME: ghanathey-neelesh-kumar/securebank-frontend

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        env:
          FLASK_ENV: testing
        run: |
          pytest -v

  python-security:
    name: Python Security Scan
    runs-on: ubuntu-latest
    needs: backend-tests

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit scan
        run: |
          bandit -r app -ll

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep scan
        run: |
          semgrep scan --config p/python backend/app

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - python-security
      - semgrep

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t securebank-backend:ci ./backend

      - name: Build frontend image
        run: |
          docker build -t securebank-frontend:ci ./frontend

      - name: Save backend image
        run: |
          docker save securebank-backend:ci -o securebank-backend.tar

      - name: Save frontend image
        run: |
          docker save securebank-frontend:ci -o securebank-frontend.tar

      - name: Upload backend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: securebank-backend-image
          path: securebank-backend.tar

      - name: Upload frontend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: securebank-frontend-image
          path: securebank-frontend.tar

  trivy-image-scan:
    name: Trivy Image Scan and Publish Vulnerabilities
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: securebank-backend-image

      - name: Download frontend image artifact
        uses: actions/download-artifact@v4
        with:
          name: securebank-frontend-image

      - name: Load backend image
        run: |
          docker load -i securebank-backend.tar

      - name: Load frontend image
        run: |
          docker load -i securebank-frontend.tar

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: securebank-backend:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: securebank-frontend:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag backend image for GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag securebank-backend:ci ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
          docker tag securebank-backend:ci ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest

      - name: Tag frontend image for GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag securebank-frontend:ci ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          docker tag securebank-frontend:ci ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:latest

      - name: Push backend image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest

      - name: Push frontend image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
