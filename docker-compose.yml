services:
  postgres:
    image: postgres:16-alpine
    container_name: securebank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - securebank_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securebank-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: securebank-backend:local
    container_name: securebank-backend
    restart: unless-stopped
    environment:
      FLASK_ENV: ${FLASK_ENV}
      APP_NAME: ${APP_NAME}
      APP_VERSION: ${APP_VERSION}
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_URL: ${DATABASE_URL}
    expose:
      - "5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - securebank-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: securebank-frontend:local
    container_name: securebank-frontend
    restart: unless-stopped
    environment:
      BACKEND_UPSTREAM: http://backend:5000
    ports:
      - "8081:8080"
    depends_on:
      - backend
    networks:
      - securebank-network

volumes:
  securebank_postgres_data:

networks:
  securebank-network:
    driver: bridge
