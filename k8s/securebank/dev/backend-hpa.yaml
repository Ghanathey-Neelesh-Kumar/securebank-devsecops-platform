apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: securebank-backend
  namespace: securebank-dev
  labels:
    app: securebank-backend
    app.kubernetes.io/name: securebank-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: securebank
    securebank.io/environment: dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: securebank-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
